# Example 5: Eval Benchmark YAML
# Run with: dstk eval run examples/05_eval_example.yaml

name: basic_tool_calling
model: deepseek-chat

cases:
  - id: weather_hangzhou
    input: "What is the weather in Hangzhou?"
    expected_tools:
      - name: get_weather
        arguments:
          city: "Hangzhou"
    expected_final_contains:
      - "Hangzhou"

  - id: weather_beijing
    input: "查询北京的天气"
    expected_tools:
      - name: get_weather
        arguments:
          city: "北京"
    expected_final_contains:
      - "北京"

  - id: math_add
    input: "What is 1 plus 2?"
    expected_tools:
      - name: add
        arguments:
          a: 1
          b: 2
    expected_final_contains:
      - "3"

  - id: search_docs
    input: "Search for Python async documentation"
    expected_tools:
      - name: search
        arguments:
          query: "Python async"
    expected_final_contains:
      - "async"

  - id: simple_chat
    input: "Hello! How are you?"
    expected_tools: []
    expected_final_contains:
      - "hello"
